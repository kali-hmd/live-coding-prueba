version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notes_api
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET=your_super_secret_key_change_in_prod
      - DB_PATH=/app/data/notes.db
      - PORT=5000
      - FLASK_ENV=development
    volumes:
      - ./backend/data:/app/data
    networks:
      - notes-network

  web:
    image: nginx:alpine
    container_name: notes_web
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge
